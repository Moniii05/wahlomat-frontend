<footer class="py-3 px-4">
  <div class="container-fluid">
    <div class="row align-items-center">
      <div class="col-12 col-md-6 text-center text-md-start mb-2 mb-md-0">
        <a routerLink="/impressum" class="footer-link small me-2">{{ 'footer.imprint' | transloco }}</a>
        <span class="text-muted small">|</span>
        <a routerLink="/about-elections" class="footer-link small ms-2 me-2">{{ 'footer.aboutElections' | transloco }}</a>
        <span class="text-muted small">|</span>
        <a routerLink="/login" class="footer-link small ms-2">{{ 'footer.login' | transloco }}</a>
      </div>
      <div class="col-12 col-md-6 text-center text-md-end">
        <a href="https://www.htw-berlin.de/" rel="noopener noreferrer">
          <img src="/htwLogo.png" [alt]="'footer.htwLogoAlt' | transloco" class="img-fluid">
        </a>
      </div>
    </div>
  </div>
</footer>
