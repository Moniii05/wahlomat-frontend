@if (currentQuestion) {
<div class="container-fluid min-vh-100 d-flex flex-column ">
  <!-- Header mit Progress -->
  <div class="row bg-light py-3 sticky-top shadow-sm ab ">
    <div class="col-12">
      <div class="d-flex justify-content-between align-items-center px-3">
        <span class="fw-bold c">{{ progressText }}</span>
        <span class=" a htw-text-muted">{{ progress }}%</span>
      </div>
      <!-- Progress Bar -->
      <div class="progress mt-2" style="height: 8px;">
        <div class="progress-bar question-progress-bar" role="progressbar" [style.width.%]="progress">
        </div>
      </div>
    </div>
  </div>

  <!-- Main Content Area -->
  <div class="row flex-grow-1">
    <div class="col-12 col-lg-8 offset-lg-2 py-3 py-lg-5 px-3 px-lg-4">
      <!-- Frage Card-->
      <div class="card border-0 shadow-sm mb-4 question-card">
        <div class="card-body p-3 p-lg-5">
          <h3 class="card-title text-center mb-0 text-white fs-5 fs-lg-4">
            {{ currentQuestion.question }}
          </h3>
        </div>
      </div>

      <!-- Gewichtung -->
      <div class="card border-0 mb-2 weight-card">
        <div class="card-body p-3">
          <div class="form-check d-flex align-items-start gap-2">
            <input class="form-check-input weight-checkbox" type="checkbox" id="weightCheckbox" [(ngModel)]="isWeighted"
              [disabled]="selectedOption === null || selectedOption === undefined">
            <label class="form-check-label" for="weightCheckbox">
              <strong class="text-dark">{{ 'questionList.weightQuestion' | transloco }}</strong>
            </label>
          </div>
        </div>
      </div>

      <!-- Answer Options - Vertikal gestapelt -->
      <div class="d-grid gap-3 mb-4">
        <button class="btn btn-lg btn-answer text-start py-3"
          [class.selected]="selectedOption === AnswerOption.STIMME_VOLL_ZU"
          (click)="selectAnswer(AnswerOption.STIMME_VOLL_ZU)">
          {{ 'questionList.options.stronglyAgree' | transloco }}
        </button>

        <button class="btn btn-lg btn-answer text-start py-3"
          [class.selected]="selectedOption === AnswerOption.STIMME_ZU" (click)="selectAnswer(AnswerOption.STIMME_ZU)">
          {{ 'questionList.options.agree' | transloco }}
        </button>

        <button class="btn btn-lg btn-answer text-start py-3" [class.selected]="selectedOption === AnswerOption.NEUTRAL"
          (click)="selectAnswer(AnswerOption.NEUTRAL)">
          {{ 'questionList.options.neutral' | transloco }}
        </button>

        <button class="btn btn-lg btn-answer text-start py-3"
          [class.selected]="selectedOption === AnswerOption.STIMME_NICHT_ZU"
          (click)="selectAnswer(AnswerOption.STIMME_NICHT_ZU)">
          {{ 'questionList.options.disagree' | transloco }}
        </button>

        <button class="btn btn-lg btn-answer text-start py-3"
          [class.selected]="selectedOption === AnswerOption.STIMME_UEBERHAUPT_NICHT_ZU"
          (click)="selectAnswer(AnswerOption.STIMME_UEBERHAUPT_NICHT_ZU)">
          {{ 'questionList.options.stronglyDisagree' | transloco }}
        </button>
      </div>
    </div>
  </div>

  <!-- Navigation Footer - Fixed am unteren Rand -->
  <div class="row border-top py-3 mt-auto sticky-bottom shadow-lg">
    <div class="col-12 col-lg-8 offset-lg-2">
      <div class="d-flex justify-content-between align-items-center gap-3 px-3">
        <!-- Links: Nur Zurück -->
        <button class="btn btn-lg btn-outline-secondary px-4 b" (click)="previousQuestion()" [disabled]="!canGoBack">
          <i class="bi bi-arrow-left me-2"></i>
          <span class="d-none d-sm-inline">{{ 'questionList.previousButton' | transloco }}</span>
        </button>

        <!-- Rechts: Dynamischer Button -->
        <button class="btn btn-lg px-4 flex-grow-1 flex-sm-grow-0 btn-nav-primary"
          [class.btn-secondary]="selectedOption === null || selectedOption === undefined"
          [class.btn-nav-primary]="selectedOption !== null && selectedOption !== undefined"
          (click)="handleNextOrSkip()">
          {{ (selectedOption !== null && selectedOption !== undefined) ? ('questionList.nextButton' | transloco) : ('questionList.skipButton' | transloco) }}
          <i class="bi bi-arrow-right ms-2"></i>
        </button>
      </div>
    </div>
  </div>
</div>
}
